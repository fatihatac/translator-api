version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translator-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
